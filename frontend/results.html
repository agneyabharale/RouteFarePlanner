<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RouteWise - Results</title>
  <link rel="stylesheet" href="results.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ================================================
       NAVBAR
  ================================================= -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo" style="text-decoration: none;">
      <div class="logo-icon">
        <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
          <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 18 10 18S24 17.5 24 10c0-5.523-4.477-10-10-10z" fill="#6366f1"/>
          <circle cx="14" cy="10" r="4" fill="white"/>
          <circle cx="10" cy="28" r="2" fill="#a5b4fc" opacity="0.6"/>
          <circle cx="14" cy="30" r="1.5" fill="#6366f1" opacity="0.4"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">RouteWise</span>
        <span class="logo-subtitle">Smart Multimodal Route Planner</span>
      </div>
    </a>

    <div class="navbar-search">
      <div class="search-box">
        <span class="search-dot dot-blue"></span>
        <input type="text" class="search-input" value="Pune Station" id="from-input" />
      </div>
      <button class="swap-btn" onclick="swapLocations()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </button>
      <div class="search-box">
        <span class="search-dot dot-red"></span>
        <input type="text" class="search-input" value="Hinjewadi Phase 1" id="to-input" />
      </div>
    </div>

    <div class="navbar-actions">
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="lang-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        EN
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="action-btn share-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        Share
      </button>
      <button class="action-btn save-btn" onclick="saveRoute(activeTab)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Route
      </button>
    </div>
  </nav>

  <!-- ================================================
       MAIN LAYOUT
  ================================================= -->
  <div class="main-layout">

    <!-- ============================================
         LEFT PANEL
    ============================================= -->
    <div class="left-panel">

      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab tab-active" data-tab="cheapest" onclick="switchTab(this, 'cheapest')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h4.5a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3H15"/></svg>
          Cheapest
        </button>
        <button class="tab" data-tab="fastest" onclick="switchTab(this, 'fastest')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Fastest
        </button>
        <button class="tab" data-tab="comfortable" onclick="switchTab(this, 'comfortable')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>
          Most Comfortable
        </button>
        <button class="tab" data-tab="all" onclick="switchTab(this, 'all')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          All Options
        </button>
      </div>

      <!-- Route Cards — fully rendered by JS -->
      <div class="route-cards-scroll" id="route-cards-scroll">
        <!-- populated by renderPanel() in results.js -->
      </div>
    </div><!-- /left-panel -->

    <!-- ============================================
         RIGHT: MAP AREA
    ============================================= -->
    <div class="map-area">

      <!-- Legend -->
      <div class="map-legend">
        <div class="legend-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#16a34a"><rect x="3" y="4" width="18" height="13" rx="2"/></svg>
          <div class="legend-line bus-legend-line"></div>
          <span>Bus</span>
        </div>
        <div class="legend-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#2563eb"><rect x="4" y="3" width="16" height="15" rx="2"/></svg>
          <div class="legend-line metro-legend-line"></div>
          <span>Metro</span>
        </div>
        <div class="legend-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="4" r="1.5" fill="#6b7280"/><path d="M9 8l2 2 2-4 3 2M9 14l1 6"/></svg>
          <div class="legend-line walk-legend-line"></div>
          <span>Walk</span>
        </div>
        <div class="legend-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#d97706"><path d="M5 11l2-5h10l2 5"/><rect x="3" y="11" width="18" height="7" rx="2"/></svg>
          <div class="legend-line cab-legend-line"></div>
          <span>Cab</span>
        </div>
      </div>

      <!-- Map Container -->
      <div class="map-container" id="map">

        <div id="leaflet-map" style="position: absolute; inset: 0; z-index: 1;"></div>
        <!-- Map Controls -->
        <div class="map-controls">
          <button class="map-ctrl layers-ctrl">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="4" rx="1"/><rect x="2" y="10" width="20" height="4" rx="1"/><rect x="2" y="17" width="20" height="4" rx="1"/></svg>
            <span>Layers</span>
          </button>
          <button class="map-ctrl zoom-ctrl" onclick="zoomIn()">+</button>
          <button class="map-ctrl zoom-ctrl" onclick="zoomOut()">−</button>
          <button class="map-ctrl location-ctrl">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          </button>
        </div>

      </div><!-- /map-container -->

      <!-- ============================================
           BOTTOM STATS + ACTIONS (inside map-area)
      ============================================= -->
      <div class="bottom-section">

        <!-- Stats Bar -->
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-icon green-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h4.5a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3H15"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Total Fare</span>
              <span class="stat-value">₹60</span>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Total Time</span>
              <span class="stat-value">45 min</span>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Transfers</span>
              <span class="stat-value">2</span>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
            <div class="stat-text">
              <span class="stat-label">Total Distance</span>
              <span class="stat-value">18.7 km</span>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn btn-outline btn-recalc" onclick="recalculate()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Recalculate
          </button>
          <button class="btn btn-outline btn-walk" onclick="lessWalking()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="4" r="1.5" fill="currentColor"/><path d="M9 8l2 2 2-4 3 2M9 14l1 6M13 14l2 6M9 8l-2 6h4l2-4"/></svg>
            Less Walking
          </button>
          <button class="btn btn-navigate" onclick="startNavigation()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
            Start Navigation
          </button>
        </div>

      </div><!-- /bottom-section -->

    </div><!-- /map-area -->
  </div><!-- /main-layout -->

  <script src="results.js"></script>
</body>
</html>
